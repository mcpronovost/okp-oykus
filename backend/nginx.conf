server {
  listen 80;
  listen [::]:80;
  server_name localhost;
  server_tokens off;

  location /admin/ {
    proxy_pass http://backend:8000/admin/;
  }

  location /api/ {
    proxy_pass http://backend:8000/api/;
  }

  location /static/ {
    proxy_pass http://backend:8000/static/;
  }

  location /media/ {
    proxy_pass http://backend:8000/media/;
  }

  location / {
    proxy_pass http://frontend:3000/;
  }
}

version: "3"

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    # command: gunicorn okp.wsgi:application
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    depends_on:
      - "db"
    env_file: .env
    restart: always

  db:
    image: postgres:14.1-alpine
    ports:
      - "5432:5432"
    environment:
      - "POSTGRES_USER=${DB_USER}"
      - "POSTGRES_PASSWORD=${DB_PASSWORD}"
      - "POSTGRES_DB=db"
      - "LANG=fr_CA=utf8"
    volumes:
      - .:/code

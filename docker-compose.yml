version: "3"

services:
  db:
    image: postgres:14.1-alpine
    ports:
      - "5432:5432"
    volumes:
      - .:/code
    networks:
      - oykus
    environment:
      - "TZ=America/Toronto"
      - "POSTGRES_USER=${DB_USER}"
      - "POSTGRES_PASSWORD=${DB_PASSWORD}"
      - "POSTGRES_DB=db"
      - "LANG=fr_CA=utf8"

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    # command: gunicorn okp.wsgi:application
    volumes:
      - ./backend:/backend
    ports:
      - "8000:8000"
    depends_on:
      - "db"
    networks:
      - oykus
    environment:
      - "TZ=America/Toronto"
    env_file: .env
    # restart: always

  frontend:
    build: ./frontend
    entrypoint: /frontend/set_ip.sh
    command: ["npm", "run", "start", "--host"]
    # command: node ./dist/server/entry.mjs
    volumes:
      - ./frontend/public:/frontend/public
      - ./frontend/src:/frontend/src
      - ./frontend/astro.config.mjs:/frontend/astro.config.mjs
      - ./frontend/package.json:/frontend/package.json
      - ./frontend/tsconfig.json:/frontend/tsconfig.json
      - ./frontend/set_ip.sh:/frontend/set_ip.sh
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - oykus
    environment:
      - "TZ=America/Toronto"
      - "BACKEND_IP=${BACKEND_IP}"
    env_file: .env
    # restart: always

  nginx:
    image: nginx:latest
    volumes:
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - oykus
    environment:
      - "TZ=America/Toronto"

networks:
  oykus:
    driver: bridge

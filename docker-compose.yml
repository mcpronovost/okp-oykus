version: "3"

services:
  db:
    image: postgres:14.1-alpine
    ports:
      - "5432:5432"
    environment:
      - "POSTGRES_USER=${DB_USER}"
      - "POSTGRES_PASSWORD=${DB_PASSWORD}"
      - "POSTGRES_DB=db"
      - "LANG=fr_CA=utf8"
    volumes:
      - .:/code
    networks:
      - oykus

  backend:
    container_name: backend
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    # command: gunicorn okp.wsgi:application
    volumes:
      - ./backend:/backend
    ports:
      - "8000:8000"
    depends_on:
      - "db"
    networks:
      - oykus
    env_file: .env
    # restart: always

  frontend:
    container_name: frontend
    build: ./frontend
    entrypoint: /frontend/set_ip.sh
    command: ["npm", "run", "start", "--host"]
    # command: node ./dist/server/entry.mjs
    volumes:
      - ./frontend/public:/frontend/public
      - ./frontend/src:/frontend/src
      - ./frontend/astro.config.mjs:/frontend/astro.config.mjs
      - ./frontend/package.json:/frontend/package.json
      - ./frontend/tsconfig.json:/frontend/tsconfig.json
      - ./frontend/set_ip.sh:/frontend/set_ip.sh
    ports:
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - oykus
    environment:
      - BACKEND_IP=${BACKEND_IP}
    env_file: .env
    # restart: always

networks:
  oykus:
    driver: bridge
